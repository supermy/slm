<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMax25 Web游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 50px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .games-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 280px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .game-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .game-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .game-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .play-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎮 MiniMax25 Web游戏</h1>
    
    <div class="games-container">
        <a href="huarongdao.html" class="game-card">
            <div class="game-icon">🏯</div>
            <div class="game-title">华容道</div>
            <div class="game-desc">
                经典三国题材益智游戏<br>
                移动棋子，让曹操逃出华容道
            </div>
            <button class="play-btn">开始游戏</button>
        </a>

        <a href="angry-birds.html" class="game-card">
            <div class="game-icon">🐦</div>
            <div class="game-title">愤怒的小鸟</div>
            <div class="game-desc">
                物理弹射类游戏<br>
                拉弓射箭，消灭所有绿猪
            </div>
            <button class="play-btn">开始游戏</button>
        </a>
    </div>

    <div class="footer">
        MiniMax25 © 2026
    </div>
</body>
</html>
