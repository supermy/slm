<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM5 游戏合集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .game-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .game-card h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .game-card p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .play-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 GLM5 游戏合集</h1>
        
        <div class="games">
            <div class="game-card">
                <div class="badge">经典益智</div>
                <div class="game-icon">🏯</div>
                <h2>华容道</h2>
                <p>经典的中国传统益智游戏，通过移动方块帮助曹操从底部出口逃脱。包含多个难度关卡，考验你的逻辑思维能力！</p>
                <a href="huarongdao.html" class="play-btn">开始游戏</a>
            </div>

            <div class="game-card">
                <div class="badge">物理射击</div>
                <div class="game-icon">🐦</div>
                <h2>愤怒的小鸟</h2>
                <p>使用弹弓发射小鸟，消灭所有的绿猪！包含多个关卡和障碍物，体验物理碰撞的乐趣！</p>
                <a href="angry-birds.html" class="play-btn">开始游戏</a>
            </div>
        </div>

        <div class="footer">
            <p>💡 所有游戏均由 GLM5 AI 生成 | 纯前端实现，无需后端服务</p>
        </div>
    </div>
</body>
</html>
