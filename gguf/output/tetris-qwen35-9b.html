<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典俄罗斯方块</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            text-shadow: 2px 2px #000;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        canvas {
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 150px;
        }

        .score-box {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
        }

        .score-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4facfe;
        }

        .controls-info {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.6;
        }

        #start-btn {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        /* 游戏结束遮罩 */
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            text-align: center;
            border: 2px solid #ff4b4b;
            border-radius: 10px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>俄罗斯方块</h1>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="ui-panel">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div id="score" class="score-value">0</div>
            </div>
            
            <button id="start-btn" onclick="startGame()">开始游戏</button>

            <div class="controls-info">
                <p>← → : 移动</p>
                <p>↑ : 旋转</p>
                <p>↓ : 加速下落</p>
            </div>
        </div>
    </div>

    <div id="game-over">
        <h2 style="color: #ff4b4b; margin-top:0;">游戏结束</h2>
        <p>最终得分：<span id="final-score">0</span></p>
        <button id="start-btn" onclick="startGame()">再玩一次</button>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const finalScoreElement = document.getElementById('final-score');
    const gameOverScreen = document.getElementById('game-over');
    const startBtn = document.getElementById('start-btn');

    // 放大倍数，让像素看起来更大
    context.scale(20, 20);

    // 定义方块形状
    const pieces = 'ILJOTSZ';
    const colors = [
        null,
        '#FF0D72', // T
        '#0DC2FF', // O
        '#0DFF72', // L
        '#F538FF', // J
        '#FF8E0D', // I
        '#FFE138', // S
        '#3877FF', // Z
    ];

    // 创建矩阵
    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // 创建具体的方块矩阵
    function createPiece(type) {
        if (type === 'I') {
            return [
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
            ];
        } else if (type === 'L') {
            return [
                [0, 2, 0],
                [0, 2, 0],
                [0, 2, 2],
            ];
        } else if (type === 'J') {
            return [
                [0, 3, 0],
                [0, 3, 0],
                [3, 3, 0],
            ];
        } else if (type === 'O') {
            return [
                [4, 4],
                [4, 4],
            ];
        } else if (type === 'Z') {
            return [
                [5, 5, 0],
                [0, 5, 5],
                [0, 0, 0],
            ];
        } else if (type === 'S') {
            return [
                [0, 6, 6],
                [6, 6, 0],
                [0, 0, 0],
            ];
        } else if (type === 'T') {
            return [
                [0, 7, 0],
                [7, 7, 7],
                [0, 0, 0],
            ];
        }
    }

    // 绘制函数
    function draw() {
        // 清空画布
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    // 绘制矩阵通用函数
    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    // 绘制方块主体
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    
                    // 绘制一点边框效果，让方块更有立体感
                    context.lineWidth = 0.05;
                    context.strokeStyle = 'rgba(0,0,0,0.5)';
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    // 合并玩家方块到场地矩阵中
    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    // 旋转矩阵
    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [
                    matrix[x][y],
                    matrix[y][x],
                ] = [
                    matrix[y][x],
                    matrix[x][y],
                ];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    // 碰撞检测
    function collide(arena, player) {
        const m = player.matrix;
        const o = player.pos;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] &&
                    arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    // 消除满行
    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length -1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }

            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;

            player.score += rowCount * 10;
            rowCount *= 2;
        }
    }

    // 玩家下落逻辑
    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    // 玩家移动逻辑
    function playerMove(offset) {
        player.pos.x += offset;
        if (collide(arena, player)) {
            player.pos.x -= offset;
        }
    }

    // 玩家重置（生成新方块）
    function playerReset() {
        const piecesStr = 'ILJOTSZ';
        player.matrix = createPiece(piecesStr[piecesStr.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) -
                       (player.matrix[0].length / 2 | 0);
        
        // 如果生成新方块时就碰撞，游戏结束
        if (collide(arena, player)) {
            gameOver();
        }
    }

    // 玩家旋转逻辑（带踢墙功能）
    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isPaused = true;
    let requestId = null;

    // 游戏主循环
    function update(time = 0) {
        if (isPaused) return;

        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestId = requestAnimationFrame(update);
    }

    function updateScore() {
        scoreElement.innerText = player.score;
    }

    function gameOver() {
        isPaused = true;
        cancelAnimationFrame(requestId);
        finalScoreElement.innerText = player.score;
        gameOverScreen.style.display = 'block';
        startBtn.innerText = "再玩一次";
    }

    function startGame() {
        // 重置场地
        arena.forEach(row => row.fill(0));
        player.score = 0;
        updateScore();
        playerReset();
        
        // UI 状态重置
        isPaused = false;
        gameOverScreen.style.display = 'none';
        startBtn.style.display = 'none'; // 隐藏开始按钮，避免重复点击
        
        if (requestId) cancelAnimationFrame(requestId);
        update();
    }

    // 场地矩阵 (12 宽 x 20 高)
    const arena = createMatrix(12, 20);

    // 玩家状态
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    // 键盘监听
    document.addEventListener('keydown', event => {
        if (isPaused) return;

        if (event.keyCode === 37) { // Left
            playerMove(-1);
        } else if (event.keyCode === 39) { // Right
            playerMove(1);
        } else if (event.keyCode === 40) { // Down
            playerDrop();
        } else if (event.keyCode === 38) { // Up (Rotate)
            playerRotate(1);
        }
    });

    // 初始绘制一次背景
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);

</script>
</body>
</html>
