<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹俄罗斯方块 - Web版</title>
    <style>
        :root {
            --bg-color: #202028;
            --text-color: #fff;
            --accent-color: #00f0ff;
            --panel-bg: #32323e;
            --border-color: #444;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation; /* 防止双击缩放 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 游戏主容器 */
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--panel-bg);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 画布样式 */
        canvas {
            background-color: #000;
            border: 2px solid var(--border-color);
            display: block;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 侧边栏信息 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 120px;
        }

        .info-box {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 下一个方块预览 */
        #next-canvas {
            margin: 0 auto;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* 控制说明 */
        .controls-info {
            font-size: 0.8em;
            color: #888;
            margin-top: auto;
            line-height: 1.5;
        }

        .key {
            display: inline-block;
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            margin: 0 2px;
            font-family: monospace;
        }

        /* 覆盖层 (开始/结束/暂停) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(51, 51, 255, 0.3);
        }

        .btn {
            background: linear-gradient(45deg, var(--accent-color), #00aaff);
            border: none;
            padding: 12px 30px;
            color: #000;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 移动端虚拟按键 */
        .mobile-controls {
            display: none; /* 默认隐藏，媒体查询开启 */
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
        }

        .m-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 0;
            border-radius: 8px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .m-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .m-btn.rotate { grid-column: 2; }
        .m-btn.left { grid-column: 1; }
        .m-btn.right { grid-column: 3; }
        .m-btn.down { grid-column: 2; }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .game-container {
                flex-direction: column;
                padding: 10px;
                width: 95%;
            }

            .sidebar {
                flex-direction: row;
                width: 100%;
                justify-content: space-between;
                min-width: unset;
            }
            
            .info-box {
                padding: 5px;
                flex: 1;
                margin: 0 5px;
            }
            
            .controls-info {
                display: none;
            }

            .mobile-controls {
                display: grid;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- 游戏主画布 -->
        <canvas id="tetris" width="240" height="400"></canvas>

        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="info-box">
                <div class="info-label">分数</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">等级</div>
                <div id="level" class="info-value">1</div>
            </div>
            <div class="info-box">
                <div class="info-label">下一个</div>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
            
            <div class="controls-info">
                <p>← → : 移动</p>
                <p>↑ : 旋转</p>
                <p>↓ : 加速</p>
                <p>空格 : 直接掉落</p>
                <p>P : 暂停</p>
            </div>
        </div>

        <!-- 开始/菜单界面 -->
        <div id="start-screen" class="overlay">
            <h1>NEON TETRIS</h1>
            <p>经典俄罗斯方块</p>
            <button class="btn" id="start-btn">开始游戏</button>
        </div>

        <!-- 暂停界面 -->
        <div id="pause-screen" class="overlay hidden">
            <h1>已暂停</h1>
            <button class="btn" id="resume-btn">继续游戏</button>
        </div>

        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>游戏结束</h1>
            <p>最终得分: <span id="final-score">0</span></p>
            <button class="btn" id="restart-btn">再玩一次</button>
        </div>
    </div>

    <!-- 移动端控制按钮 -->
    <div class="mobile-controls">
        <div class="m-btn left" data-key="ArrowLeft">←</div>
        <div class="m-btn rotate" data-key="ArrowUp">↻</div>
        <div class="m-btn right" data-key="ArrowRight">→</div>
        <div class="m-btn down" data-key="ArrowDown">↓</div>
    </div>

<script>
/**
 * 游戏配置与常量
 */
const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = 24; // 基础方块大小
const COLORS = [
    null,
    '#FF0D72', // T
    '#0DC2FF', // O
    '#0DFF72', // L
    '#F538FF', // J
    '#FF8E0D', // I
    '#FFE138', // S
    '#3877FF', // Z
];

// 方块形状定义
const PIECES = [
    null,
    [[0, 1, 0], [1, 1, 1], [0, 0, 0]], // T
    [[2, 2], [2, 2]],                   // O
    [[0, 3, 0], [0, 3, 0], [0, 3, 3]], // L
    [[0, 4, 0], [0, 4, 0], [4, 4, 0]], // J
    [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]], // I
    [[0, 6, 6], [6, 6, 0], [0, 0, 0]], // S
    [[7, 7, 0], [0, 7, 7], [0, 0, 0]], // Z
];

/**
 * 游戏核心类
 */
class TetrisGame {
    constructor(canvasId, nextCanvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.nextCanvas = document.getElementById(nextCanvasId);
        this.nextCtx = this.nextCanvas.getContext('2d');

        // 调整画布大小以适应屏幕
        this.ctx.scale(BLOCK_SIZE, BLOCK_SIZE);
        this.nextCtx.scale(BLOCK_SIZE, BLOCK_SIZE);

        this.grid = this.createGrid(COLS, ROWS);
        this.score = 0;
        this.level = 1;
        this.lines = 0;
        
        this.dropCounter = 0;
        this.dropInterval = 1000;
        this.lastTime = 0;

        this.isPaused = false;
        this.isGameOver = false;
        this.isRunning = false;

        this.player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        this.nextPiece = null;
        
        this.bindEvents();
    }

    // 创建空网格
    createGrid(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // 重置游戏
    reset() {
        this.grid = this.createGrid(COLS, ROWS);
        this.score = 0;
        this.level = 1;
        this.lines = 0;
        this.dropInterval = 1000;
        this.isGameOver = false;
        this.isPaused = false;
        this.isRunning = true;
        
        this.updateScore();
        this.playerReset();
        this.update();
    }

    // 生成随机方块
    createPiece(type) {
        // type 1-7
        if (type === undefined) {
            type = (Math.random() * 7 | 0) + 1;
        }
        return PIECES[type];
    }

    // 玩家重置（生成新方块）
    playerReset() {
        if (this.nextPiece === null) {
            this.nextPiece = this.createPiece();
        }
        
        this.player.matrix = this.nextPiece;
        this.nextPiece = this.createPiece();
        
        // 渲染下一个方块
        this.drawNextPiece();

        // 初始位置居中
        this.player.pos.y = 0;
        this.player.pos.x = (this.grid[0].length / 2 | 0) - (this.player.matrix[0].length / 2 | 0);

        // 检查游戏结束
        if (this.collide(this.grid, this.player)) {
            this.gameOver();
        }
    }

    // 碰撞检测
    collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    // 绘制单个方块
    drawBlock(ctx, x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
        
        // 简单的立体效果
        ctx.lineWidth = 0.05;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.strokeRect(x, y, 1, 1);
        
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(x + 0.1, y + 0.8, 0.8, 0.1);
        ctx.fillRect(x + 0.8, y + 0.1, 0.1, 0.8);
    }

    // 主绘制函数
    draw() {
        // 清空画布
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // 绘制已固定的方块
        this.drawMatrix(this.grid, {x: 0, y: 0}, this.ctx);
        
        // 绘制当前正在下落的方块
        this.drawMatrix(this.player.matrix, this.player.pos, this.ctx);
    }

    // 绘制矩阵通用函数
    drawMatrix(matrix, offset, context) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    this.drawBlock(context, x + offset.x, y + offset.y, COLORS[value]);
                }
            });
        });
    }

    // 绘制下一个方块预览
    drawNextPiece() {
        this.nextCtx.fillStyle = '#32323e'; // 与侧边栏背景一致
        this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
        
        // 居中计算
        const xOffset = (4 - this.nextPiece[0].length) / 2;
        const yOffset = (4 - this.nextPiece.length) / 2;
        
        this.drawMatrix(this.nextPiece, {x: xOffset, y: yOffset}, this.nextCtx);
    }

    // 合并方块到网格
    merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    // 旋转矩阵
    rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    // 玩家旋转操作
    playerRotate(dir) {
        const pos = this.player.pos.x;
        let offset = 1;
        this.rotate(this.player.matrix, dir);
        // 墙踢检测（防止旋转出界）
        while (this.collide(this.grid, this.player)) {
            this.player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > this.player.matrix[0].length) {
                this.rotate(this.player.matrix, -dir);
                this.player.pos.x = pos;
                return;
            }
        }
    }

    // 玩家下落
    playerDrop() {
        this.player.pos.y++;
        if (this.collide(this.grid, this.player)) {
            this.player.pos.y--;
            this.merge(this.grid, this.player);
            this.arenaSweep();
            this.playerReset();
        }
        this.dropCounter = 0;
    }

    // 玩家移动
    playerMove(dir) {
        this.player.pos.x += dir;
        if (this.collide(this.grid, this.player)) {
            this.player.pos.x -= dir;
        }
    }
    
    // 硬降落（直接到底）
    playerHardDrop() {
        while (!this.collide(this.grid, this.player)) {
            this.player.pos.y++;
        }
        this.player.pos.y--; // 回退一步到合法位置
        this.merge(this.grid, this.player);
        this.arenaSweep();
        this.playerReset();
        this.dropCounter = 0;
    }

    // 消除行逻辑
    arenaSweep() {
        let rowCount = 0;
        outer: for (let y = this.grid.length - 1; y > 0; --y) {
            for (let x = 0; x < this.grid[y].length; ++x) {
                if (this.grid[y][x] === 0) {
                    continue outer;
                }
            }
            const row = this.grid.splice(y, 1)[0].fill(0);
            this.grid.unshift(row);
            ++y;
            rowCount++;
        }
        
        if (rowCount > 0) {
            // 计分规则: 1行=10, 2行=30, 3行=60, 4行=100 * 等级
            const lineScores = [0, 10, 30, 60, 100];
            this.score += lineScores[rowCount] * this.level;
            this.lines += rowCount;
            
            // 每消除10行升一级
            this.level = Math.floor(this.lines / 10) + 1;
            // 速度随等级增加，最低100ms
            this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
            
            this.updateScore();
        }
    }

    updateScore() {
        document.getElementById('score').innerText = this.score;
        document.getElementById('level').innerText = this.level;
    }

    gameOver() {
        this.isGameOver = true;
        this.isRunning = false;
        document.getElementById('final-score').innerText = this.score;
        document.getElementById('game-over-screen').classList.remove('hidden');
    }

    togglePause() {
        if (this.isGameOver || !this.isRunning) return;
        
        this.isPaused = !this.isPaused;
        const pauseScreen = document.getElementById('pause-screen');
        
        if (this.isPaused) {
            pauseScreen.classList.remove('hidden');
        } else {
            pauseScreen.classList.add('hidden');
            this.lastTime = performance.now(); // 重置时间防止跳帧
            this.update();
        }
    }

    // 游戏主循环
    update(time = 0) {
        if (!this.isRunning || this.isPaused) return;

        const deltaTime = time - this.lastTime;
        this.lastTime = time;

        this.dropCounter += deltaTime;
        if (this.dropCounter > this.dropInterval) {
            this.playerDrop();
        }

        this.draw();
        requestAnimationFrame(this.update.bind(this));
    }

    bindEvents() {
        // 键盘控制
        document.addEventListener('keydown', event => {
            if (!this.isRunning || this.isPaused) {
                // 如果游戏未开始或暂停，按P键恢复，按Enter开始
                if (event.key.toLowerCase() === 'p' && !this.isGameOver) {
                    this.togglePause();
                }
                return;
            }

            switch (event.keyCode) {
                case 37: // Left
                    this.playerMove(-1);
                    break;
                case 39: // Right
                    this.playerMove(1);
                    break;
                case 40: // Down
                    this.playerDrop();
                    break;
                case 38: // Up (Rotate)
                    this.playerRotate(1);
                    break;
                case 32: // Space (Hard Drop)
                    this.playerHardDrop();
                    break;
                case 80: // P (Pause)
                    this.togglePause();
                    break;
            }
        });

        // 按钮事件
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            this.reset();
        });

        document.getElementById('resume-btn').addEventListener('click', () => {
            this.togglePause();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').classList.add('hidden');
            this.reset();
        });

        // 移动端触摸控制
        const touchButtons = document.querySelectorAll('.m-btn');
        touchButtons.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 防止默认行为
                if (!this.isRunning || this.isPaused) return;
                
                const key = btn.getAttribute('data-key');
                if (key === 'ArrowLeft') this.playerMove(-1);
                if (key === 'ArrowRight') this.playerMove(1);
                if (key === 'ArrowDown') this.playerDrop();
                if (key === 'ArrowUp') this.playerRotate(1);
            });
            
            // 简单的触摸长按支持（可选）
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
            });
        });
    }
}

// 初始化游戏
const game = new TetrisGame('tetris', 'next-canvas');

</script>
</body>
</html>
